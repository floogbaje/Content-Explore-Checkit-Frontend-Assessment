<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 200 300"
  fill="none"
>
  <!-- Background -->
  <rect width="200" height="300" fill="#1f2937"/>

  <!-- Film strip holes top -->
  <rect x="8"  y="10" width="16" height="12" rx="2" fill="#111827"/>
  <rect x="34" y="10" width="16" height="12" rx="2" fill="#111827"/>
  <rect x="60" y="10" width="16" height="12" rx="2" fill="#111827"/>
  <rect x="86" y="10" width="16" height="12" rx="2" fill="#111827"/>
  <rect x="112" y="10" width="16" height="12" rx="2" fill="#111827"/>
  <rect x="138" y="10" width="16" height="12" rx="2" fill="#111827"/>
  <rect x="164" y="10" width="16" height="12" rx="2" fill="#111827"/>

  <!-- Film strip holes bottom -->
  <rect x="8"   y="278" width="16" height="12" rx="2" fill="#111827"/>
  <rect x="34"  y="278" width="16" height="12" rx="2" fill="#111827"/>
  <rect x="60"  y="278" width="16" height="12" rx="2" fill="#111827"/>
  <rect x="86"  y="278" width="16" height="12" rx="2" fill="#111827"/>
  <rect x="112" y="278" width="16" height="12" rx="2" fill="#111827"/>
  <rect x="138" y="278" width="16" height="12" rx="2" fill="#111827"/>
  <rect x="164" y="278" width="16" height="12" rx="2" fill="#111827"/>

  <!-- Camera icon centred -->
  <g transform="translate(70, 118)">
    <!-- Camera body -->
    <rect x="0" y="12" width="60" height="42" rx="5" fill="#374151"/>
    <!-- Camera lens ring -->
    <circle cx="30" cy="33" r="15" fill="#111827"/>
    <circle cx="30" cy="33" r="10" fill="#1f2937"/>
    <circle cx="30" cy="33" r="5"  fill="#374151"/>
    <!-- Viewfinder bump -->
    <rect x="20" y="6" width="20" height="10" rx="3" fill="#374151"/>
    <!-- Flash -->
    <rect x="46" y="14" width="8" height="6" rx="2" fill="#4b5563"/>
  </g>

  <!-- "No image" label -->
  <text
    x="100"
    y="210"
    text-anchor="middle"
    font-family="system-ui, sans-serif"
    font-size="11"
    font-weight="500"
    fill="#6b7280"
    letter-spacing="0.05em"
  >NO IMAGE</text>
</svg>
